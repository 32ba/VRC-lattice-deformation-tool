name: Build Release

on:
  workflow_dispatch:
    inputs:
      test-report:
        description: "Local EditMode evidence (date, Unity version, passed/failed/skipped, and report path or URL)"
        required: true
        type: string
      performance-report:
        description: "Local Profiler evidence (scenario, p50/p95/max, GC allocation, and report path or URL)"
        required: true
        type: string

jobs:

  # Validate Repository Configuration
  config:
    runs-on: ubuntu-latest
    outputs:
      config_package: ${{ steps.config_package.outputs.configPackage }}
    steps:

    # Ensure that required repository variable has been created for the Package
    - name: Validate Package Config
      id: config_package
      env:
        TEST_REPORT: ${{ inputs.test-report }}
        PERFORMANCE_REPORT: ${{ inputs.performance-report }}
      run: |
        if [ "${{ vars.PACKAGE_NAME }}" != "" ] && [ -n "$TEST_REPORT" ] && [ -n "$PERFORMANCE_REPORT" ]; then
          echo "configPackage=true" >> $GITHUB_OUTPUT;
        else
          echo "configPackage=false" >> $GITHUB_OUTPUT;
          echo "PACKAGE_NAME, test-report, and performance-report are required." >&2;
          exit 1;
        fi

  # Build and release the Package
  # If the repository is not configured properly, this job will be skipped
  build:
    needs: config
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.config.outputs.config_package == 'true'
    steps:

      # Checkout Local Repository
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: vpm.32ba.net

      # Get the Package version based on the package.json file
      - name: Get Version
        id: version
        uses: zoexx/github-action-json-file-properties@b9f36ce6ee6fe2680cd3c32b2c62e22eade7e590
        with: 
            file_path: "package.json"
            prop_path: "version"

      - name: Reject an existing release tag
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          if [[ ! "$PACKAGE_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json contains an invalid release version: $PACKAGE_VERSION" >&2
            exit 1
          fi
          git fetch --force --tags
          if git rev-parse --verify --quiet "refs/tags/$PACKAGE_VERSION"; then
            echo "Release tag $PACKAGE_VERSION already exists. Bump package.json before releasing." >&2
            exit 1
          fi
    
      # Configure the Environment Variables needed for releasing the Package
      - name: Set Environment Variables
        id: set_env
        run: |
          echo "zipFile=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}".zip >> $GITHUB_OUTPUT
          echo "unityPackage=${{ vars.PACKAGE_NAME }}-${{ steps.version.outputs.value }}.unitypackage" >> $GITHUB_OUTPUT
          
      # Zip the Package for release
      - name: Create Package Zip
        run: zip -r "${{ github.workspace }}/${{ steps.set_env.outputs.zipFile }}" . -x '.*' '*/.*' 'AGENTS.md' 'AGENTS.md.meta' 'CLAUDE.md' 'CLAUDE.md.meta' 'Tests/' 'Tests/**' 'Tests.meta' 'Tools~/' 'Tools~/**'

      - name: Prepare Unity Package Layout
        run: |
          set -euo pipefail
          PACKAGE_ROOT="Packages/${{ vars.PACKAGE_NAME }}"
          ZIP_FILE="${{ steps.set_env.outputs.zipFile }}"
          UNITYPACKAGE_FILE="${{ steps.set_env.outputs.unityPackage }}"

          rm -rf "$PACKAGE_ROOT"
          mkdir -p "$PACKAGE_ROOT"

          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gitmodules' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude 'AGENTS.md' \
            --exclude 'AGENTS.md.meta' \
            --exclude 'CLAUDE.md' \
            --exclude 'CLAUDE.md.meta' \
            --exclude 'Tests/' \
            --exclude 'Tests.meta' \
            --exclude 'Tools~/' \
            --exclude 'metaList' \
            --exclude "$ZIP_FILE" \
            --exclude "$UNITYPACKAGE_FILE" \
            --exclude 'Packages/' \
            ./ "$PACKAGE_ROOT"/

      # Build a list of .meta files for future use
      - name: Track Package Meta Files
        run: find "Packages/${{ vars.PACKAGE_NAME }}" -name \*.meta -print | sort > metaList
      
      # Make a UnityPackage version of the Package for release
      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@b5c57408698b1fab8b3a84d4b67f767b8b7c0be9 # v1.2.3
        with:
          package-path: ${{ steps.set_env.outputs.unityPackage }}
          include-files: metaList
      
      # Make a release tag of the version from the package.json file 
      - name: Create Tag
        id: tag_version
        uses: rickstaa/action-create-tag@88dbf7ff6fe2405f8e8f6c6fdfd78829bc631f83
        with:
          tag: "${{ steps.version.outputs.value }}"
      
      # Publish the Release to GitHub
      - name: Make Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          files: |
            ${{ steps.set_env.outputs.zipFile }}
            ${{ steps.set_env.outputs.unityPackage }}
            package.json
          tag_name: ${{ steps.version.outputs.value }}
          body: |
            Unity tests are run locally because this repository does not provide a Unity-capable Actions runner.

            Local EditMode evidence: ${{ inputs.test-report }}

            Local performance evidence: ${{ inputs.performance-report }}

      # Update listing using the GitHub API
      - name: Update VPM repository
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/vpm.32ba.net/dispatches \
            -d '{"event_type": "update-listing", "client_payload": {}}'
