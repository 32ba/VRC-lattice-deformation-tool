name: Coverage

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      project-path:
        description: "Absolute path to the Unity project containing this package"
        required: false
        default: "D:\\VRC\\Projects\\Plugin-dev-playground"
        type: string
      unity-path:
        description: "Absolute path to Unity.exe"
        required: false
        default: "C:\\Program Files\\Unity\\Hub\\Editor\\2022.3.22f1\\Editor\\Unity.exe"
        type: string
      minimum-test-total:
        description: "Minimum expected EditMode test count"
        required: false
        default: "900"
        type: string
  workflow_call:
    inputs:
      project-path:
        description: "Absolute path to the Unity project containing this package"
        required: false
        type: string
      unity-path:
        description: "Absolute path to Unity.exe"
        required: false
        default: "C:\\Program Files\\Unity\\Hub\\Editor\\2022.3.22f1\\Editor\\Unity.exe"
        type: string
      minimum-test-total:
        description: "Minimum expected EditMode test count"
        required: false
        default: "900"
        type: string

concurrency:
  group: coverage-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: ${{ inputs.project-path || vars.UNITY_PROJECT_PATH || 'D:\\VRC\\Projects\\Plugin-dev-playground' }}
  UNITY_PATH: ${{ inputs.unity-path || 'C:\\Program Files\\Unity\\Hub\\Editor\\2022.3.22f1\\Editor\\Unity.exe' }}
  MINIMUM_TEST_TOTAL: ${{ inputs.minimum-test-total || '900' }}

jobs:
  editmode-coverage:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout package
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Validate runner configuration
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PROJECT_PATH)) {
            throw "Set the UNITY_PROJECT_PATH repository variable or pass project-path explicitly."
          }
          if (-not (Test-Path -LiteralPath $env:PROJECT_PATH)) {
            throw "Project path was not found: $env:PROJECT_PATH"
          }
          if (-not (Test-Path -LiteralPath $env:UNITY_PATH)) {
            throw "Unity executable was not found: $env:UNITY_PATH"
          }

      - name: Sync package into Unity project
        shell: pwsh
        run: |
          $sourcePath = "${{ github.workspace }}"
          $destinationPath = Join-Path $env:PROJECT_PATH "Packages\net.32ba.lattice-deformation-tool"

          if (([System.IO.Path]::GetFullPath($sourcePath)).TrimEnd('\') -ieq ([System.IO.Path]::GetFullPath($destinationPath)).TrimEnd('\')) {
            Write-Host "Checkout is already at the Unity package path."
            return
          }

          New-Item -ItemType Directory -Force -Path $destinationPath | Out-Null
          robocopy $sourcePath $destinationPath /MIR /XD .git .claude /XF .git /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }
          $global:LASTEXITCODE = 0

      - name: Preflight coverage configuration
        shell: pwsh
        run: >
          & "$env:PROJECT_PATH\Packages\net.32ba.lattice-deformation-tool\Tools~\Run-Coverage.ps1"
          -ProjectPath "$env:PROJECT_PATH"
          -UnityPath "$env:UNITY_PATH"
          -MinimumTestTotal $env:MINIMUM_TEST_TOTAL
          -PreflightOnly

      - name: Run EditMode tests with code coverage
        shell: pwsh
        run: >
          & "$env:PROJECT_PATH\Packages\net.32ba.lattice-deformation-tool\Tools~\Run-Coverage.ps1"
          -ProjectPath "$env:PROJECT_PATH"
          -UnityPath "$env:UNITY_PATH"
          -MinimumTestTotal $env:MINIMUM_TEST_TOTAL
          -EnforceLineCoverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lattice-coverage
          path: ${{ env.PROJECT_PATH }}\Temp\LatticeCoverage
